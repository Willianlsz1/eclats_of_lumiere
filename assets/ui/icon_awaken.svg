<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#2c1268"/>
      <stop offset="100%" stop-color="#080420"/>
    </radialGradient>
    <radialGradient id="gc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e2d0ff"/>
      <stop offset="38%" stop-color="#7848cc" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#3a18a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="go" x1="15%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#f6e068"/>
      <stop offset="18%" stop-color="#c88c28"/>
      <stop offset="46%" stop-color="#f2d05a"/>
      <stop offset="74%" stop-color="#a86c1e"/>
      <stop offset="100%" stop-color="#ecca44"/>
    </linearGradient>
    <linearGradient id="gi" x1="85%" y1="10%" x2="15%" y2="90%">
      <stop offset="0%" stop-color="#eecc48"/>
      <stop offset="50%" stop-color="#b07c20"/>
      <stop offset="100%" stop-color="#e2bc3a"/>
    </linearGradient>
    <linearGradient id="gt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b0f4e8"/>
      <stop offset="100%" stop-color="#1c8880"/>
    </linearGradient>
    <filter id="sg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- outer gold medallion ring -->
  <circle cx="128" cy="128" r="124" fill="url(#go)"/>

  <!-- decorative ring notches at cardinals and intercardinals -->
  <polygon points="128,4 132,15 128,22 124,15" fill="#faeA70"/>
  <polygon points="252,128 241,132 234,128 241,124" fill="#faeA70"/>
  <polygon points="128,252 124,241 128,234 132,241" fill="#faeA70"/>
  <polygon points="4,128 15,124 22,128 15,132" fill="#faeA70"/>
  <polygon points="218,38 214,50 207,47 211,35" fill="#e2ba3a"/>
  <polygon points="218,218 206,214 209,207 221,211" fill="#e2ba3a"/>
  <polygon points="38,218 42,206 49,209 45,221" fill="#e2ba3a"/>
  <polygon points="38,38 50,42 47,49 35,45" fill="#e2ba3a"/>

  <!-- ring inner cutout -->
  <circle cx="128" cy="128" r="112" fill="#0c0824"/>

  <!-- ring decorative tracks -->
  <circle cx="128" cy="128" r="116" fill="none" stroke="url(#gi)" stroke-width="2.5"/>
  <circle cx="128" cy="128" r="109" fill="none" stroke="#4c2878" stroke-width="1.5"/>
  <circle cx="128" cy="128" r="105" fill="none" stroke="#2a1454" stroke-width="0.5"/>

  <!-- interior fill -->
  <circle cx="128" cy="128" r="104" fill="url(#bg)"/>

  <!-- 8-pointed star beam background (subtle) -->
  <rect x="124" y="28" width="8" height="200" fill="#1e0e4c" opacity="0.9"/>
  <rect x="124" y="28" width="8" height="200" fill="#180a40" opacity="0.85" transform="rotate(90 128 128)"/>
  <rect x="124" y="28" width="8" height="200" fill="#140838" opacity="0.75" transform="rotate(45 128 128)"/>
  <rect x="124" y="28" width="8" height="200" fill="#140838" opacity="0.75" transform="rotate(135 128 128)"/>

  <!-- cardinal points (violet) -->
  <polygon points="128,30 133.5,58 128,70 122.5,58" fill="#9d7bff" filter="url(#sg)"/>
  <polygon points="128,226 122.5,198 128,186 133.5,198" fill="#9d7bff" filter="url(#sg)"/>
  <polygon points="30,128 58,122.5 70,128 58,133.5" fill="#9d7bff" filter="url(#sg)"/>
  <polygon points="226,128 198,133.5 186,128 198,122.5" fill="#9d7bff" filter="url(#sg)"/>

  <!-- diagonal points (teal) -->
  <polygon points="187,69 174,90 168,84 181,63" fill="url(#gt)"/>
  <polygon points="69,69 90,82 84,88 63,75" fill="url(#gt)"/>
  <polygon points="187,187 166,174 172,168 193,181" fill="url(#gt)"/>
  <polygon points="69,187 82,166 88,172 75,193" fill="url(#gt)"/>

  <!-- inner border ring -->
  <circle cx="128" cy="128" r="54" fill="#0e0630" stroke="#5830a2" stroke-width="2.5"/>
  <circle cx="128" cy="128" r="46" fill="#0c0528" stroke="#3c1e7a" stroke-width="1"/>

  <!-- gold diamond gems on inner ring (cardinals) -->
  <polygon points="128,74 133,82 128,90 123,82" fill="url(#go)"/>
  <polygon points="128,182 123,174 128,166 133,174" fill="url(#go)"/>
  <polygon points="74,128 82,123 90,128 82,133" fill="url(#go)"/>
  <polygon points="182,128 174,133 166,128 174,123" fill="url(#go)"/>

  <!-- teal micro-gems between cardinals on inner ring -->
  <circle cx="104" cy="88" r="3.5" fill="#5ee0d2" opacity="0.75"/>
  <circle cx="152" cy="88" r="3.5" fill="#5ee0d2" opacity="0.75"/>
  <circle cx="104" cy="168" r="3.5" fill="#5ee0d2" opacity="0.75"/>
  <circle cx="152" cy="168" r="3.5" fill="#5ee0d2" opacity="0.75"/>

  <!-- center glow -->
  <circle cx="128" cy="128" r="38" fill="url(#gc)"/>
  <circle cx="128" cy="128" r="22" fill="#3c1a82" opacity="0.95"/>
  <circle cx="128" cy="128" r="13" fill="#7a48cc" opacity="0.9" filter="url(#sg)"/>
  <circle cx="128" cy="128" r="6.5" fill="#d4b4ff" opacity="0.96"/>
  <circle cx="128" cy="128" r="2.5" fill="#f6f0ff"/>

  <!-- gold swirl arcs on ring (decorative) -->
  <path d="M128,16 A112,112 0 0,1 222,74" fill="none" stroke="#e8c840" stroke-width="1" opacity="0.32"/>
  <path d="M222,182 A112,112 0 0,1 128,240" fill="none" stroke="#e8c840" stroke-width="1" opacity="0.32"/>
  <path d="M128,240 A112,112 0 0,1 34,182" fill="none" stroke="#e8c840" stroke-width="1" opacity="0.32"/>
  <path d="M34,74 A112,112 0 0,1 128,16" fill="none" stroke="#e8c840" stroke-width="1" opacity="0.32"/>
</svg>
