<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Éclats of Lumière</title>
</head>
<body>
  <header id="topbar">
    <span>Lumens: <b id="top-lumens">0</b></span>
    <span class="vestiges">Vestiges: <b id="top-vestiges">0</b></span>
    <span>Kills: <b id="top-kills">0</b></span>
    <span id="top-zone"></span>
    <span class="nav">
      <button id="btn-prev" type="button">◀ Recuar subárea</button>
      <button id="btn-next" type="button">Avançar subárea ▶</button>
    </span>
  </header>

  <div id="offline-banner" hidden>
    <span id="offline-text"></span>
    <button id="offline-close" type="button">OK</button>
  </div>

  <main id="layout">
    <section id="player-card" aria-label="The Seeker">
      <h2>The Seeker</h2>
      <p>Level <b id="p-level">1</b></p>
      <div class="bar"><div class="bar-fill hp" id="p-hp-fill"></div></div>
      <p>HP: <b id="p-hp-text"></b></p>
      <p>XP total: <b id="p-xp">0</b></p>
      <p>DPS: <b id="p-dps">0</b></p>
      <p>APS: <b id="p-aps">0</b> · Crit: <b id="p-crit"></b></p>
      <p id="p-status" class="status-dead" hidden></p>
      <h3>Gold Stats</h3>
      <div id="stat-rows"></div>
      <h3>Convergence</h3>
      <p class="conv-meta">Feitas: <b id="c-count">0</b> · Pontos: <b id="c-points">0</b> · Fator: <b id="c-factor">×1</b></p>
      <div class="bar conv"><div class="bar-fill conv" id="c-fill"></div></div>
      <p class="conv-meta"><span id="c-progress"></span></p>
      <button id="btn-converge" type="button" disabled></button>
    </section>

    <section id="enemy-grid" aria-label="Campo de combate"></section>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
