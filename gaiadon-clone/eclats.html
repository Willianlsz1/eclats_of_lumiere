<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Éclats of Lumière</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Design system Éclats (CP-1) -->
  <link rel="stylesheet" href="css/eclats/tokens.css">
  <link rel="stylesheet" href="css/eclats/shell.css">
</head>
<body>
  <div id="screen">
    <div id="stage">
      <div id="stage-backdrop"></div>

      <!-- TOP BAR: marca + moedas -->
      <header class="topbar">
        <div class="brand">
          <span class="title">Éclats of <span class="lum">Lumière</span></span>
          <span class="rank">Seeker · Tier I</span>
        </div>
        <div class="coins"><!-- gerado por shell.js --></div>
      </header>

      <!-- MAIN: telas (geradas por shell.js) -->
      <main class="stage-main"><!-- views --></main>

      <!-- BOTTOM NAV: 7 ícones + provisórias (geradas por shell.js) -->
      <nav class="bottomnav"><!-- navbtns --></nav>
    </div>
  </div>

  <div id="toosmall">Gire o dispositivo ou amplie a janela —<br>Éclats é desenhado para 1920×1080.</div>

  <!-- manifest de assets + shell -->
  <script src="assets/manifest.js"></script>
  <script src="js/eclats/shell.js"></script>
</body>
</html>
